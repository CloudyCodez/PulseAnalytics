<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0f1e;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #1e293b;
      -webkit-app-region: drag;
      user-select: none;
    }

    .logo {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .logo span {
      color: #00e5cc;
    }

    .tagline {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 40px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #1e293b;
      border-top: 3px solid #00e5cc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #status {
      font-size: 12px;
      color: #475569;
      letter-spacing: 0.3px;
    }

    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="logo">Pulse<span>.</span></div>
  <div class="tagline">Automated Business Intelligence</div>
  <div class="spinner"></div>
  <div id="status"><span class="dots">Starting Pulse</span></div>

  <script>
    const messages = [
      "Starting Pulse",
      "Warming up Pulse AI",
      "Loading your data",
      "Almost ready",
    ];
    let i = 0;
    const el = document.getElementById("status");
    setInterval(() => {
      i = (i + 1) % messages.length;
      el.innerHTML = '<span class="dots">' + messages[i] + '</span>';
    }, 3000);
  </script>
</body>
</html>
